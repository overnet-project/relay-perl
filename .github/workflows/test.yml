name: run-tests

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/test.yml'
      - '.perlcriticrc'
      - '.perltidyrc'
      - 'bin/**'
      - 'cpanfile'
      - 'deploy/**'
      - 'lib/**'
      - 'Makefile.PL'
      - 't/**'
      - 'xt/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/test.yml'
      - '.perlcriticrc'
      - '.perltidyrc'
      - 'bin/**'
      - 'cpanfile'
      - 'deploy/**'
      - 'lib/**'
      - 'Makefile.PL'
      - 't/**'
      - 'xt/**'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        perl: ['5.40', 'latest']
    name: Perl ${{ matrix.perl }}
    env:
      PERL5LIB: /home/runner/perl5/lib/perl5:${{ github.workspace }}/core-perl/lib:${{ github.workspace }}/irc-server/lib
      PERL_LOCAL_LIB_ROOT: /home/runner/perl5
      PERL_MB_OPT: --install_base /home/runner/perl5
      PERL_MM_OPT: INSTALL_BASE=/home/runner/perl5

    steps:
      - uses: actions/checkout@v4
        with:
          path: relay-perl

      - uses: actions/checkout@v4
        with:
          repository: overnet-project/core-perl
          path: core-perl

      - uses: actions/checkout@v4
        with:
          repository: overnet-project/irc-server
          path: irc-server

      - uses: actions/checkout@v4
        with:
          repository: overnet-project/adapter-irc-perl
          path: adapter-irc-perl

      - uses: actions/checkout@v4
        with:
          repository: overnet-project/spec
          path: spec

      - name: Link spec checkout above the workspace
        run: ln -sfn "$GITHUB_WORKSPACE/spec" "$GITHUB_WORKSPACE/../spec"

      - uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl }}

      - uses: actions/cache@v4
        with:
          path: ~/perl5
          key: perl-${{ matrix.perl }}-${{ hashFiles('relay-perl/cpanfile', 'relay-perl/Makefile.PL', 'relay-perl/.github/workflows/test.yml') }}

      - name: Install dependencies
        run: |
          cpanm --local-lib ~/perl5 --installdeps ./core-perl
          cpanm --local-lib ~/perl5 --installdeps ./relay-perl
          cpanm --local-lib ~/perl5 --reinstall https://github.com/overnet-project/overnet-perl-style/archive/refs/heads/main.tar.gz

      - name: Run tests
        working-directory: relay-perl
        run: |
          prove -r -l -v t/
          prove -r -l -v xt/author/
